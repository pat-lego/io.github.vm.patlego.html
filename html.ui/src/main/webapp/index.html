<!DOCTYPE html>
<html lang="en">

<head>
    <title>Welcome to Page Editor</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@next"></script>

    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
        integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
    <style>
        .intro {
            font-family: "Poppins", sans-serif;
        }
    </style>
</head>

<body class="flex flex-col h-screen">

    {{>WEB-INF/components/header}}

    <!-- Main Section -->
    <section class="flex-grow w-full text-center md:text-left pt-20">
        <div class="flex flex-col items-center justify-center text-center md:text-left intro">
            <p class="text-3xl p-5">Welcome to page editor.</p>
            <p class="text-3xl p-5">Where you can create your own components and then use them to build your own pages
            </p>
        </div>
        <div class="flex flex-col items-center steps">
            <ol>
                <li class="p-5">
                    <p
                        class="flex justify-center p-5 bg-blue-200 rounded-md transition-shadow duration-500 hover:shadow-2xl">
                        Create a component</p>
                </li>
                <li class="p-5">
                    <p
                        class="flex justify-center p-5 bg-blue-200 rounded-md transition-shadow duration-500 hover:shadow-2xl">
                        Create a page</p>
                </li>
                <li class="p-5">
                    <p
                        class="flex justify-center p-5 bg-blue-200 rounded-md transition-shadow duration-500 hover:shadow-2xl">
                        Add components to the page</p>
                </li>
            </ol>
        </div>
    </section>

    {{>WEB-INF/components/footer}}

</body>

</html>
